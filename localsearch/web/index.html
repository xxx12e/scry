<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>本地语义搜索 · LocalSearch</title>
<script>/* set theme before first paint to avoid a flash */
(function(){try{var t=localStorage.getItem('ls_theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root { --bg:#f6f7f9; --card:#fff; --line:#e3e6ea; --fg:#1f2329; --mut:#6b7280;
          --accent:#2563eb; --accent2:#1d4ed8;
          --btn:#fff; --soft:#f3f5f8; --chipbg:#eef2f7; --badgefg:#374151;
          --snipfg:#374151; --bar:#e9edf3; --mark:#fde68a; --markfg:#1f2329;
          --err:#b91c1c; --warn:#b45309; --persbg:#dbeafe; --persfg:#1e40af;
          --sel:rgba(37,99,235,.18); color-scheme:light; }
  :root[data-theme="dark"] {
          --bg:#0f1216; --card:#171b21; --line:#2a2f37; --fg:#e6e9ee; --mut:#9aa4b2;
          --accent:#3b82f6; --accent2:#60a5fa;
          --btn:#1f242c; --soft:#1c2129; --chipbg:#232a33; --badgefg:#c3ccd7;
          --snipfg:#c7cfda; --bar:#2a2f37; --mark:#6b5d1a; --markfg:#fef3c7;
          --err:#f87171; --warn:#fbbf24; --persbg:#1e3a5f; --persfg:#bfdbfe;
          --sel:rgba(59,130,246,.32); color-scheme:dark; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:15px/1.5 system-ui,"Segoe UI","Microsoft YaHei",sans-serif; }
  .wrap { max-width:880px; margin:0 auto; padding:24px 18px 60px; }
  h1 { font-size:22px; margin:0 0 2px; }
  .head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .sub { color:var(--mut); font-size:13px; margin-bottom:18px; }
  .langbtn { flex:none; padding:6px 12px; border:1px solid var(--line); background:var(--btn);
             border-radius:8px; cursor:pointer; font-size:13px; color:var(--fg); }
  .langbtn:hover { border-color:var(--accent); color:var(--accent); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:16px; margin-bottom:16px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  input[type=text] { flex:1; min-width:200px; padding:10px 12px; border:1px solid var(--line);
                     border-radius:8px; font-size:15px; background:var(--btn); color:var(--fg); }
  button { padding:9px 14px; border:1px solid var(--line); background:var(--btn); color:var(--fg);
           border-radius:8px; cursor:pointer; font-size:14px; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.primary:hover { background:var(--accent2); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .toggle { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .toggle button { border:0; border-radius:0; background:var(--btn); }
  .toggle button.on { background:var(--accent); color:#fff; }
  .status { color:var(--mut); font-size:13px; }
  .bar { height:8px; background:var(--bar); border-radius:6px; overflow:hidden; margin-top:8px; display:none; }
  .bar > div { height:100%; width:0; background:var(--accent); transition:width .2s; }
  .res { border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:10px; }
  .res.selected { border-color:var(--accent); box-shadow:0 0 0 2px var(--sel); }
  .res .name { font-weight:600; }
  .res .path { color:var(--mut); font-size:12px; word-break:break-all; margin:2px 0 6px; }
  .res .snip { font-size:13.5px; color:var(--snipfg); background:var(--soft); border-radius:6px; padding:8px 10px; }
  .res .acts { margin-top:8px; display:flex; gap:8px; }
  .res .acts button { padding:5px 10px; font-size:13px; }
  .score { color:var(--mut); font-size:12px; float:right; }
  .empty { color:var(--mut); padding:8px 2px; }
  .err { color:var(--err); font-size:13px; }
  .note { color:var(--mut); font-size:13px; margin-top:8px; }
  .note.warn { color:var(--warn); }
  mark { background:var(--mark); color:var(--markfg); border-radius:3px; padding:0 1px; }
  select { padding:9px 8px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--btn); color:var(--fg); }
  .meta { color:var(--mut); font-size:12px; margin:4px 0 0; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .badge { background:var(--chipbg); color:var(--badgefg); border-radius:4px; padding:1px 7px; font-size:11px; text-transform:uppercase; }
  .badge.pers { background:var(--persbg); color:var(--persfg); text-transform:none; }
  .chip { display:inline-flex; align-items:center; gap:6px; background:var(--chipbg); border:1px solid var(--line);
          border-radius:16px; padding:2px 6px 2px 10px; font-size:12px; margin:3px 4px 0 0; max-width:100%; }
  .chip span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:320px; }
  .chip button { border:0; background:transparent; padding:0 4px; font-size:13px; color:var(--mut); }
  .chip button:hover { color:var(--err); }
  .kbd { border:1px solid var(--line); border-bottom-width:2px; border-radius:4px; padding:0 4px;
         font-size:11px; background:var(--btn); color:var(--mut); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1><span data-i18n="app_title">本地语义搜索</span> <span style="font-size:13px;color:var(--mut)">LocalSearch</span></h1>
      <div class="sub" data-i18n="app_sub">🔒 全部在本机运行，不联网，文件内容不会离开你的电脑。</div>
    </div>
    <div style="display:flex; gap:8px; flex:none">
      <button class="langbtn" id="themeBtn" onclick="toggleTheme()" title="夜间模式 / Dark mode" aria-label="theme">🌙</button>
      <button class="langbtn" id="langBtn" onclick="toggleLang()">EN</button>
    </div>
  </div>

  <div class="card">
    <div style="font-weight:500"><span data-i18n="ctrl_title">掌控模式 · 深度索引</span>
      <span style="font-size:12px;color:var(--mut)" data-i18n="ctrl_badge">独家</span></div>
    <div class="note" style="margin:2px 0 8px" data-i18n-html="ctrl_note"></div>
    <div class="row">
      <input id="folder" type="text" data-i18n-ph="ph_folder">
      <button onclick="pickFolder()" data-i18n="btn_browse">浏览…</button>
      <button class="primary" id="addBtn" onclick="addFolder()" data-i18n="btn_add">扫描并掌控</button>
      <button id="cancelBtn" onclick="cancelBuild()" style="display:none" data-i18n="btn_cancel">取消</button>
    </div>
    <div class="row" style="margin-top:8px">
      <span class="note" style="margin:0" data-i18n="lbl_wholedisk">全盘扫描：</span>
      <span id="drives"></span>
      <button id="rescanBtn" onclick="rescan()" data-i18n="btn_rescan" data-i18n-title="ttl_rescan">重新扫描（仅变化）</button>
    </div>
    <div class="note" id="ocrRow" style="margin-top:8px; display:none; align-items:center; gap:10px; flex-wrap:wrap">
      <label style="display:inline-flex; align-items:center; gap:6px; cursor:pointer">
        <input type="checkbox" id="ocrChk" onchange="toggleOcr()">
        <span data-i18n="ocr_label" data-i18n-title="ttl_ocr">识别图片文字（OCR）</span>
      </label>
      <span style="font-size:12px; color:var(--mut)" data-i18n="ocr_hint">用系统内置引擎读出截图/扫描件里的文字 · 不下载模型 · 全程本地</span>
    </div>
    <div class="note warn" id="ocrRescan" style="display:none" data-i18n="ocr_rescan">已开启图片识别 —— 点「重新扫描」后，截图 / 扫描件就能按意思搜到。</div>
    <div class="note" id="ocrUnavail" style="display:none; color:var(--mut)" data-i18n="ocr_unavail">这台电脑没装 Windows OCR 语言包，暂时识别不了图片文字。</div>
    <div id="folderChips"></div>
    <div class="bar" id="bar"><div id="barFill"></div></div>
    <div class="status" id="status" style="margin-top:8px" data-i18n="st_loading">加载中…</div>
    <div class="note" id="uiNote" style="display:none"></div>
    <div class="note" id="buildNote" style="display:none"></div>
    <div class="err" id="sysErr" style="margin-top:6px"></div>
  </div>

  <div class="card">
    <div class="row">
      <input id="q" type="text" list="recent" autofocus data-i18n-ph="ph_query" onkeydown="qKey(event)">
      <datalist id="recent"></datalist>
      <span class="toggle">
        <button id="mInstant" class="on" onclick="setMode('instant')" data-i18n="mode_instant" data-i18n-title="ttl_instant">全盘语义</button>
        <button id="mName" onclick="setMode('filename')" data-i18n="mode_filename" data-i18n-title="ttl_filename">文件名</button>
        <button id="mSem" onclick="setMode('semantic')" data-i18n="mode_semantic" data-i18n-title="ttl_semantic">深度语义</button>
      </span>
      <select id="scope" data-i18n-title="ttl_scope"><option value="">全盘</option></select>
      <select id="topk" data-i18n-title="ttl_topk">
        <option value="10" data-i18n="topk_10">10 条</option>
        <option value="20" selected data-i18n="topk_20">20 条</option>
        <option value="50" data-i18n="topk_50">50 条</option>
      </select>
      <button class="primary" onclick="doSearch()" data-i18n="btn_search">搜索</button>
    </div>
    <div class="note" style="margin-top:6px" data-i18n-html="kbd_hint"></div>
    <div class="note" id="persRow" style="margin-top:6px; display:flex; align-items:center; gap:10px; flex-wrap:wrap">
      <label style="display:inline-flex; align-items:center; gap:6px; cursor:pointer">
        <input type="checkbox" id="persChk" onchange="togglePers()">
        <span data-i18n="pers_label" data-i18n-title="ttl_pers">个性化</span>
      </label>
      <button class="langbtn" style="padding:3px 10px; font-size:12px" id="forgetBtn" onclick="forgetMe()"
              data-i18n="btn_forget" data-i18n-title="ttl_forget">忘记我</button>
      <span style="font-size:12px; color:var(--mut)" data-i18n="pers_hint">越用越懂你 · 全程本地</span>
    </div>
    <div class="err" id="searchErr"></div>
  </div>

  <div id="results"></div>

  <div class="card" id="dlcCard" style="display:none">
    <div style="font-weight:500"><span data-i18n="dlc_title">扩展包</span>
      <span style="font-size:12px;color:var(--mut)" data-i18n="dlc_badge">可选</span></div>
    <div class="note" style="margin:2px 0 8px" data-i18n="dlc_note">按需下载的可选增强(基础版 100% 离线;扩展包只在你点击时才从本项目 GitHub 下载并校验)。</div>
    <div class="note warn" id="dlcRestart" style="display:none" data-i18n="dlc_restart">已安装/更改扩展包 —— 关掉窗口重新打开即可生效。</div>
    <div id="dlcList"></div>
  </div>
</div>

    err_build_failed:"Indexing failed.", err_no_file:"File no longer exists.",
    err_idx_version:"The index format was upgraded — one rescan is needed (the old index was moved aside).",
    err_idx_corrupt:"The index files look damaged (possibly from a power loss / forced shutdown) — a rescan is needed.",
    err_idx_load:"Failed to load the index — a rescan is needed.",
    generic_fail:"Operation failed", open_fail:"Cannot open",
    pers_label:"Personalize", ttl_pers:"Learns your preferences locally from the files you open and ranks likelier ones higher (all on-device, never uploaded, never trains the model)",
    btn_forget:"Forget me", ttl_forget:"Clear everything learned locally (open history + interest vector)",
    pers_hint:"Gets to know you as you use it · fully local · never uploaded · never trains the model",
    nt_forgot:"Cleared the local personalization profile.", badge_personal:"frequent",
    ocr_label:"Read text in images (OCR)",
    ttl_ocr:"Use the Windows built-in OCR engine to read text inside images (screenshots, scans, photos) so they can be found by meaning too. No model download, fully on-device; click Rescan to apply.",
    ocr_hint:"Reads text inside screenshots / scans with the built-in engine · no model download · fully local",
    ocr_rescan:"Image OCR is on — click Rescan and your screenshots / scans become searchable by meaning.",
    ocr_unavail:"This PC has no Windows OCR language pack, so image text can't be read yet.",
    nt_ocr_on:"Image OCR is on. Click Rescan to fold screenshots / scans into the index.",
    nt_ocr_off:"Image OCR is off.",
    nt_ocr_unavail:"No usable Windows OCR language pack on this PC — can't enable it.",
    dlc_title:"Add-ons", dlc_badge:"optional",
    dlc_note:"Optional enhancements, downloaded on demand (the base app is 100% offline; a pack is only fetched — and checksum-verified — from this project's GitHub when you click).",
    dlc_restart:"Add-on installed/changed — close this window and reopen to apply.",
    btn_download:"Download", btn_installed:"Installed", btn_uninstall:"Uninstall",
    dlc_downloading:"downloading {pct}%", dlc_soon:"coming soon",
  },
};
let LANG = localStorage.getItem('ls_lang') === 'en' ? 'en' : 'zh';
let MODE = "instant";
let WS_OK = null;
let MODEL_READY = false;
let LAST_QUERY = "";
let SEQ = 0;
let SEL = -1;
let PERS_ON = true;
let PERS_PENDING = false;
let LAST_RESULTS = null;
let LAST_MODE = "instant";

function t(key, p){
  let s = (I18N[LANG] && I18N[LANG][key]);
  if(s == null) s = I18N.zh[key];
  if(s == null) s = key;
  if(p) for(const k in p) s = s.split('{'+k+'}').join(p[k]);
  return s;
}
function emsg(r){ return (r && r.code) ? t('err_'+r.code) : ((r && r.error) || t('generic_fail')); }
function currentTheme(){ return document.documentElement.getAttribute('data-theme')==='dark' ? 'dark' : 'light'; }
function setThemeIcon(){ const b=document.getElementById('themeBtn'); if(b) b.textContent = currentTheme()==='dark' ? '☀️' : '🌙'; }
function toggleTheme(){
  const next = currentTheme()==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem('ls_theme', next); }catch(e){}
  setThemeIcon();
}
function applyLang(){
  document.documentElement.lang = LANG==='zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder = t(el.dataset.i18nPh); });
  document.querySelectorAll('[data-i18n-title]').forEach(el=>{ el.title = t(el.dataset.i18nTitle); });
  document.getElementById('langBtn').textContent = LANG==='zh' ? 'EN' : '中';
}
function toggleLang(){
  LANG = LANG==='zh' ? 'en' : 'zh';
  localStorage.setItem('ls_lang', LANG);
  applyLang();
  loadDrives();
  loadDlc();
  poll();
  if(LAST_RESULTS !== null) renderResults(LAST_RESULTS, LAST_MODE);
}
function setMode(m){ MODE=m;
  document.getElementById('mInstant').classList.toggle('on', m==='instant');
  document.getElementById('mName').classList.toggle('on', m==='filename');
  document.getElementById('mSem').classList.toggle('on', m==='semantic');
}
function notice(msg, warn){
  const n=document.getElementById('uiNote');
  n.textContent=msg; n.className='note'+(warn?' warn':''); n.style.display='block';
  clearTimeout(notice._t); notice._t=setTimeout(()=>{n.style.display='none';}, 6000);
}
async function api(path, body){
  const r = await fetch(path, {method: body?'POST':'GET',
    headers:{'Content-Type':'application/json'}, body: body?JSON.stringify(body):undefined});
  return r.json();
}
async function pickFolder(){
  const r = await api('/api/pick_folder', {});
  if(r.path) document.getElementById('folder').value = r.path;
}
async function addFolder(){
  const path = document.getElementById('folder').value.trim();
  if(!path){ notice(t('nt_need_folder'), true); return; }
  const r = await api('/api/add_folder', {path});
  if(!r.ok){ notice(emsg(r), true); }
}
async function removeFolder(path){
  const r = await api('/api/remove_folder', {path});
  if(r.ok){ notice(t('nt_removed', {path})); poll(); }
  else notice(emsg(r), true);
}
async function cancelBuild(){ await api('/api/cancel_build', {}); }
async function togglePers(){
  PERS_PENDING = true;
  PERS_ON = document.getElementById('persChk').checked;
  await api('/api/personalize', {enabled: PERS_ON});
  PERS_PENDING = false;
  if(document.getElementById('q').value.trim()) doSearch();
}
async function forgetMe(){
  await api('/api/forget', {});
  notice(t('nt_forgot'));
  if(document.getElementById('q').value.trim()) doSearch();
}
let OCR_PENDING=false, OCR_AVAIL=false, OCR_ON=false, OCR_EXPECT=null;
async function toggleOcr(){
  const chk=document.getElementById('ocrChk');
  const want = chk.checked;                 // availability is probed server-side on enable
  OCR_PENDING=true;
  const r=await api('/api/ocr', {enabled: want});
  if(!r || !r.ok){ chk.checked=OCR_ON; OCR_PENDING=false; notice(emsg(r), true); return; }
  OCR_AVAIL = !!r.available;
  OCR_ON = !!r.enabled; chk.checked = OCR_ON;
  chk.disabled = want && !OCR_AVAIL;
  document.getElementById('ocrUnavail').style.display = (want && !OCR_AVAIL)? 'block':'none';
  document.getElementById('ocrRescan').style.display = OCR_ON? 'block':'none';
  notice(t((want && !OCR_AVAIL)? 'nt_ocr_unavail' : (OCR_ON? 'nt_ocr_on':'nt_ocr_off')),
         want && !OCR_AVAIL);
  OCR_EXPECT = OCR_ON;          // ignore any status predating this toggle until confirmed
  OCR_PENDING=false;
}
function applyOcrStatus(o){
  if(!o) return;
  const known = o.available===true || o.available===false;   // null => not yet probed
  OCR_AVAIL = known ? !!o.available : true;                   // optimistic until a probe
  document.getElementById('ocrRow').style.display = 'flex';
  document.getElementById('ocrUnavail').style.display = (known && !o.available)? 'block':'none';
  document.getElementById('ocrChk').disabled = known && !o.available;
  if(OCR_PENDING) return;
  const enabled = !!o.enabled;
  if(OCR_EXPECT!==null){ if(enabled!==OCR_EXPECT) return; OCR_EXPECT=null; }  // drop stale
  OCR_ON = enabled;
  const chk=document.getElementById('ocrChk');
  if(chk.checked!==OCR_ON) chk.checked=OCR_ON;
  document.getElementById('ocrRescan').style.display = OCR_ON? 'block':'none';
}
let DLC_PACKS=[];
async function loadDlc(){
  try{
    const r=await api('/api/dlc'); DLC_PACKS=r.packs||[];
    document.getElementById('dlcCard').style.display = DLC_PACKS.length? 'block':'none';
    renderDlc(r.progress, r.restart_required);
  }catch(e){}
}
function renderDlc(prog, restart){
  document.getElementById('dlcRestart').style.display = restart? 'block':'none';
  document.getElementById('dlcList').innerHTML = DLC_PACKS.map(p=>{
    const name = LANG==='zh'? p.name_zh : p.name_en;
    const desc = LANG==='zh'? p.desc_zh : p.desc_en;
    const mb = p.size? ' · '+Math.round(p.size/1048576)+' MB' : '';
    let btn;
    if(p.installed) btn=`<button data-dlc-un="${escapeHtml(p.id)}">${escapeHtml(t('btn_uninstall'))}</button>`;
    else if(!p.available) btn=`<button disabled>${escapeHtml(t('dlc_soon'))}</button>`;
    else if(prog && prog.id===p.id && prog.status==='downloading'){
      const pct=prog.total? Math.round(100*prog.done/prog.total):0;
      btn=`<button disabled>${escapeHtml(t('dlc_downloading',{pct}))}</button>`;
    } else btn=`<button class="primary" data-dlc-in="${escapeHtml(p.id)}">${escapeHtml(t('btn_download'))}</button>`;
    return `<div class="res" style="display:flex;justify-content:space-between;align-items:center;gap:12px">
      <div><div class="name">${escapeHtml(name)}${escapeHtml(mb)}</div>
        <div class="note" style="margin:2px 0 0">${escapeHtml(desc)}</div></div>
      <div style="flex:none">${btn}</div></div>`;
  }).join('');
}
document.getElementById('dlcList').addEventListener('click', ev=>{
  const inb=ev.target.closest('button[data-dlc-in]'); if(inb){ installDlc(inb.dataset.dlcIn); return; }
  const unb=ev.target.closest('button[data-dlc-un]'); if(unb){ uninstallDlc(unb.dataset.dlcUn); }
});
async function installDlc(id){ const r=await api('/api/dlc/install',{id});
  if(!r.ok) notice(r.error||t('generic_fail'), true); loadDlc(); }
async function uninstallDlc(id){ await api('/api/dlc/uninstall',{id}); loadDlc(); }
loadDlc();
async function loadDrives(){
  const r = await api('/api/drives');
  const drives = r.drives||[];
  document.getElementById('drives').innerHTML = drives.map(d=>
    `<button data-drive="${escapeHtml(d)}" title="${escapeHtml(t('ttl_drive', {d}))}">${escapeHtml(d)}</button>`
  ).join(' ');
  const scope=document.getElementById('scope');
  const cur=scope.value;
  scope.innerHTML = `<option value="">${escapeHtml(t('scope_all'))}</option>` + drives.map(d=>
    `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
  scope.value=cur;
}
document.getElementById('drives').addEventListener('click', ev=>{
  const b = ev.target.closest('button[data-drive]');
  if(b) addDrive(b.dataset.drive);
});
async function addDrive(d){
  const r = await api('/api/add_folder', {path:d});
  if(r.ok) notice(t('nt_drive_started', {d}));
  else notice(emsg(r), true);
}
async function rescan(){
  const r = await api('/api/rescan', {});
  if(r.ok) notice(t('nt_rescan_started'));
  else notice(emsg(r), true);
}

async function poll(){
  try{
    const s = await api('/api/status');
    WS_OK = s.ws_available; MODEL_READY = !!s.model_ready;
    if(s.personalize && !PERS_PENDING){ PERS_ON = !!s.personalize.enabled;
      const pc=document.getElementById('persChk'); if(pc && pc.checked!==PERS_ON) pc.checked=PERS_ON; }
    applyOcrStatus(s.ocr);
    if(DLC_PACKS.length){
      renderDlc(s.dlc, s.restart_required);
      const tag = s.dlc? (s.dlc.status+'|'+s.dlc.id) : '';
      if(s.dlc && (s.dlc.status==='done'||s.dlc.status==='error') && poll._dlcTag!==tag){ poll._dlcTag=tag; loadDlc(); }
    }
    const bar=document.getElementById('bar'), fill=document.getElementById('barFill');
    const cancel=document.getElementById('cancelBtn'), note=document.getElementById('buildNote');
    const mi=document.getElementById('mInstant');
    if(WS_OK===false){
      mi.disabled=true; mi.title=t('ttl_instant_off');
      if(MODE==='instant'){ setMode('filename'); notice(t('nt_ws_switch'), true); }
    }
    const codes = [s.index_error, s.last_error].filter(Boolean).map(c=>t('err_'+c));
    let sysErr = codes.join(' ');
    if(s.last_error && s.last_error_detail) sysErr += ' ('+s.last_error_detail+')';
    document.getElementById('sysErr').textContent = sysErr;
    const chipsKey = JSON.stringify(s.folders||[]) + '|' + LANG;
    if(chipsKey !== poll._chipsKey){
      poll._chipsKey = chipsKey;
      document.getElementById('folderChips').innerHTML = (s.folders||[]).map(f=>
        `<span class="chip" data-path="${escapeHtml(f)}" title="${escapeHtml(f)}"><span>${escapeHtml(f)}</span>`+
        `<button data-act="rmfolder" title="${escapeHtml(t('ttl_chip_remove'))}">✕</button></span>`
      ).join('');
    }
    if(s.building){
      bar.style.display='block'; cancel.style.display='inline-block';
      const p=s.progress, pct=p.total? Math.round(100*p.done/p.total):0;
      fill.style.width=pct+'%';
      document.getElementById('status').textContent=
        t('st_building', {done:p.done, total:p.total, file:(p.file? '（'+p.file+'）':'')});
      document.getElementById('addBtn').disabled=true;
      document.getElementById('rescanBtn').disabled=true;
    }else{
      bar.style.display='none'; cancel.style.display='none';
      document.getElementById('addBtn').disabled=false;
      document.getElementById('rescanBtn').disabled=false;
      const folders = s.folders.length? t('st_folders_n', {n:s.folders.length}) : t('st_no_folders');
      const model = MODEL_READY? t('st_model', {name:s.model.split('/').pop().split('\\').pop()})
                               : t('st_model_loading');
      document.getElementById('status').textContent=
        t('st_ready', {files:s.files, chunks:s.chunks, model, folders});
      const lb=s.last_build;
      if(lb && (lb.failed>0 || lb.cancelled)){
        note.style.display='block';
        note.textContent = (lb.cancelled? t('bn_cancelled') : '')
          + (lb.failed>0? t('bn_skipped', {n:lb.failed}) : '');
      } else { note.style.display='none'; }
    }
  }catch(e){ document.getElementById('status').textContent=t('st_disconnected'); }
}

function highlight(text, terms){
  let h = escapeHtml(text);
  if(terms && terms.length){
    const esc = terms.filter(x=>x).map(x=>x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
    if(esc.length){
      try{ h = h.replace(new RegExp('('+esc.join('|')+')','gi'), '<mark>$1</mark>'); }catch(e){}
    }
  }
  return h;
}
function qKey(ev){
  if(ev.key==='Enter'){
    if(SEL>=0){ openSelected(); }
    else doSearch();
  }
  else if(ev.key==='ArrowDown'){
    const q=document.getElementById('q').value.trim();
    if(q && q===LAST_QUERY && resultCount()>0){
      ev.preventDefault(); ev.target.blur(); moveSel(1);
    }
  }
  else if(SEL>=0){ clearSel(); }
}
function clearSel(){
  SEL=-1;
  document.querySelectorAll('#results .res.selected').forEach(el=>el.classList.remove('selected'));
}
function openSelected(){
  const el=document.querySelectorAll('#results .res')[SEL];
  if(el) openPath(el.dataset.path, false);
}
function resultCount(){ return document.querySelectorAll('#results .res').length; }
function moveSel(delta){
  const n=resultCount(); if(!n) return;
  SEL = SEL<0? (delta>0?0:n-1) : Math.min(n-1, Math.max(0, SEL+delta));
  document.querySelectorAll('#results .res').forEach((el,i)=>{
    el.classList.toggle('selected', i===SEL);
    if(i===SEL) el.scrollIntoView({block:'nearest'});
  });
}
document.addEventListener('keydown', ev=>{
  if(ev.target && (ev.target.tagName==='INPUT' || ev.target.tagName==='SELECT'
                   || ev.target.tagName==='BUTTON' || ev.target.tagName==='TEXTAREA')) return;
  if(ev.key==='ArrowDown'){ ev.preventDefault(); moveSel(1); }
  else if(ev.key==='ArrowUp'){ ev.preventDefault(); moveSel(-1); }
  else if(ev.key==='Enter' && SEL>=0){ openSelected(); }
  else if(ev.key==='/'){ ev.preventDefault(); document.getElementById('q').focus(); }
});
document.getElementById('folderChips').addEventListener('click', ev=>{
  const b = ev.target.closest('button[data-act="rmfolder"]');
  if(b) removeFolder(b.closest('.chip').dataset.path);
});
document.getElementById('results').addEventListener('click', ev=>{
  const b = ev.target.closest('button[data-act]');
  if(!b) return;
  const path = b.closest('.res').dataset.path;
  if(b.dataset.act==='open') openPath(path, false);
  else if(b.dataset.act==='reveal') openPath(path, true);
});
function renderResults(items, mode){
  const box=document.getElementById('results');
  SEL=-1;
  if(!items.length){
    const tip = mode==='instant' ? t('em_tip_instant')
              : mode==='filename' ? t('em_tip_filename') : t('em_tip_semantic');
    box.innerHTML = '<div class="empty">' + t('em_none') + tip + '</div>';
    return;
  }
  box.innerHTML = items.map(it=>{
    const score = it.score!=null? `<span class="score">${escapeHtml(t('res_score', {score:it.score}))}</span>`:'';
    const meta = [
      it.personal? `<span class="badge pers" title="${escapeHtml(t('ttl_pers'))}">${escapeHtml(t('badge_personal'))}</span>`:'',
      it.ext? `<span class="badge">${escapeHtml(it.ext)}</span>`:'',
      it.size? `${escapeHtml(it.size)}`:'',
      it.mtime? escapeHtml(t('res_modified', {mtime:it.mtime})):''
    ].filter(Boolean).join('<span style="opacity:.5">·</span>');
    const snip = it.snippet? `<div class="snip">${highlight(it.snippet, it.terms)}</div>`:'';
    return `<div class="res" data-path="${escapeHtml(it.path)}">${score}<div class="name">${escapeHtml(it.name)}</div>
      <div class="meta">${meta}</div>
      <div class="path">${escapeHtml(it.path)}</div>${snip}
      <div class="acts">
        <button data-act="open">${escapeHtml(t('btn_open'))}</button>
        <button data-act="reveal">${escapeHtml(t('btn_reveal'))}</button>
      </div></div>`;
  }).join('');
}
async function doSearch(){
  const q=document.getElementById('q').value.trim();
  const box=document.getElementById('results'); const err=document.getElementById('searchErr');
  err.textContent='';
  if(!q){ box.innerHTML=''; LAST_RESULTS=null; return; }
  addRecent(q);
  LAST_QUERY=q; SEL=-1;
  const mode=MODE;
  const my = ++SEQ;
  const k = parseInt(document.getElementById('topk').value, 10) || 20;
  const scope = document.getElementById('scope').value || undefined;
  box.innerHTML = '<div class="empty">'+
    ((mode!=='filename' && !MODEL_READY)? t('st_search_wait') : t('st_searching'))+'</div>';
  const r = await api('/api/search', {query:q, mode, top_k:k, scope});
  if(my!==SEQ) return;
  err.textContent = r.error? emsg(r) : '';
  LAST_RESULTS = r.results||[]; LAST_MODE = mode;
  renderResults(LAST_RESULTS, mode);
}
async function openPath(path, reveal){
  const r = await api('/api/open', {path, reveal});
  if(!r.ok) notice(emsg(r) || t('open_fail'), true);
}
function addRecent(q){
  let r = []; try{ r = JSON.parse(localStorage.getItem('ls_recent')||'[]'); }catch(e){}
  r = [q, ...r.filter(x=>x!==q)].slice(0,8);
  localStorage.setItem('ls_recent', JSON.stringify(r));
  document.getElementById('recent').innerHTML = r.map(x=>`<option value="${escapeHtml(x)}">`).join('');
}
function escapeHtml(s){ return (''+(s==null?'':s)).replace(/[&<>"']/g, c=>(
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

try{ const rec=JSON.parse(localStorage.getItem('ls_recent')||'[]');
  document.getElementById('recent').innerHTML = rec.map(x=>`<option value="${escapeHtml(x)}">`).join(''); }catch(e){}
applyLang();
setThemeIcon();
loadDrives();
setInterval(poll, 1000); poll();
</script>
